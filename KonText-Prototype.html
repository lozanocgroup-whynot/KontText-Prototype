function Btn({ children, variant = "primary", className = "", disabled, ...rest }) {
  const base = "inline-flex items-center justify-center gap-2 rounded-lg px-4 py-2.5 text-sm font-medium transition-colors";
  const styles = {
    primary: "bg-brand text-white hover:bg-branddark disabled:opacity-40 disabled:cursor-not-allowed",
    secondary: "bg-white text-brand border border-brand hover:bg-tint disabled:opacity-40",
    ghost: "text-muted hover:text-ink hover:bg-tint",
    danger: "bg-white text-danger border border-danger hover:bg-red-50",
  };
  return (
    <button disabled={disabled} className={`${base} ${styles[variant]} ${className}`} {...rest}>
      {children}
    </button>
  );
}

function Field({ label, ...rest }) {
  return (
    <label className="block">

}

function TextArea({ label, rows = 3, ...rest }) {
  return (
    <label className="block">

      <textarea

        className="w-full rounded-lg border border-line bg-white px-3.5 py-2.5 text-sm outline-none focus:border-brand"

}

function Card({ children, className = "" }) {

// Fallback master prompt, shown only when no API key is connected (generic — no fixed identity).

/* ----------------------------- AI: config ----------------------------- */
/* The Claude key is NOT here and never in the browser. It lives on your Supabase
   server (the `claude` Edge Function). The app just asks that function, which talks
   to Claude. Users never see or enter a key. */

const AI = {
  model_fast: "claude-haiku-4-5-20251001", // quick: adaptive follow-up questions
  model_smart: "claude-sonnet-4-6",        // higher quality: the master prompt
};

/* ----------------------------- Cloud sync (Supabase) ----------------------------- */
/* The Supabase URL + publishable (anon) key are PUBLIC by design — safe to ship in the
   browser and in GitHub. Row Level Security makes sure each person only sees their own
   data. One table `kontext_state` holds one jsonb blob per user — the persisted memory.

   FOR THE LIVE/HOSTED SITE: paste your two PUBLIC values on the next two lines. Once both
   are filled the app connects automatically — no Settings step for visitors. Leave the key
   blank to instead enter it in Settings (saved only in your own browser). */

const SUPABASE_URL_DEFAULT = "https://vccirheyjtrwesxdoguv.supabase.co"; // your Project URL
const SUPABASE_KEY_DEFAULT = "sb_publishable_rCuzeZ3KNjG39V7sGbUPLA_HVoGntHR"; // public key — safe to ship

const LS_SB = "kontext_supabase_cfg";
function loadCfg() {
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(LS_SB) || "null"); } catch (e) {}
  if (saved && saved.url && saved.key) return saved;
  if (SUPABASE_URL_DEFAULT && SUPABASE_KEY_DEFAULT) return { url: SUPABASE_URL_DEFAULT, key: SUPABASE_KEY_DEFAULT };
  return saved;
}
function saveCfg(c) { try { c ? localStorage.setItem(LS_SB, JSON.stringify(c)) : localStorage.removeItem(LS_SB); } catch (e) {} }
function makeClient(cfg) {
  if (!cfg || !cfg.url || !cfg.key) return null;
  if (typeof supabase === "undefined" || !supabase.createClient) return null;
  try { return supabase.createClient(cfg.url, cfg.key); } catch (e) { return null; }
}
async function loadState(sb, userId) {
  const { data, error } = await sb.from("kontext_state").select("data").eq("user_id", userId).maybeSingle();
  if (error) throw new Error(error.message);
  return data ? data.data : null;
}
async function saveState(sb, userId, blob) {
  const { error } = await sb.from("kontext_state").upsert({ user_id: userId, data: blob, updated_at: new Date().toISOString() });
  if (error) throw new Error(error.message);
}

// Initials for the avatar, from the user's real name.
function initials(name) {
  const parts = String(name || "").trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return "·";
  return (parts[0][0] + (parts[1] ? parts[1][0] : "")).toUpperCase();
}

// Turn the user's REAL profile (account type + onboarding answers) into text for the AI.
// This is the "memory" — everything the user entered flows through here into every prompt.
function profileToText(profile, accountType) {
  const fixed = accountType === "Business" ? Q_BUSINESS : Q_PERSONAL;
  const ans = (profile && profile.answers) || {};
  const lines = [];
  fixed.forEach((f, i) => {
    const a = ans[i];
    if (a && String(a).trim()) lines.push(`- ${f.q} → ${a}`);
  });
  const l2 = (profile && profile.layer2) || {};
  const l2labels = (profile && profile.l2q) || ADAPTIVE_MOCK;
  Object.keys(l2).forEach((k) => {
    const v = l2[k];
    if (v && String(v).trim()) {
      const qi = parseInt(String(k).replace("a", ""), 10);
      const q = l2labels[qi] || "Follow-up";
      lines.push(`- ${q} → ${v}`);
    }
  });
  const name = (profile && profile.name) || "(not provided)";
  const header = `Name: ${name}\nAccount type: ${accountType}`;
  return lines.length
    ? `${header}\nProfile answers:\n${lines.join("\n")}`
    : `${header}\n(No profile answers captured yet — keep the output general.)`;
}

// Ask Claude through your Supabase Edge Function (the key stays on the server).
async function callClaude(sb, { system, user, model, max_tokens = 1024 }) {
  if (!sb) throw new Error("Not connected to your KonText server yet.");
  const { data, error } = await sb.functions.invoke("claude", { body: { system, user, model, max_tokens } });
  if (error) throw new Error(error.message || "AI request failed");
  if (data && data.error) throw new Error(data.error);
  return ((data && data.text) || "").trim();
}

// Generate adaptive onboarding follow-ups from the user's first-round answers.
async function genOnboarding(sb, layer1Str) {
  const system = "You are KonText, building a person's identity profile. Given their first-round answers, write 5 short, specific follow-up questions that go deeper into their voice, style, goals, and how they want AI to represent them. Each question is one sentence, written directly to them. Return ONLY a JSON array of strings — no other text, no markdown.";
  const raw = await callClaude(sb, { system, user: layer1Str, model: AI.model_fast, max_tokens: 500 });
  let arr;
  try { arr = JSON.parse(raw); }
  catch (e) { const m = raw.match(/\[[\s\S]*\]/); arr = m ? JSON.parse(m[0]) : null; }
  if (!Array.isArray(arr) || arr.length < 1) throw new Error("Could not read the questions");
  return arr.slice(0, 6).map(String);
}

// Generate exactly two adaptive follow-up questions for one core project question.
async function genFollowups(sb, profileStr, coreQ, answer) {
  const system = "You are KonText, an engine that personalizes AI for a specific person. Given their identity profile, one core project question, and their answer, write exactly two short, specific follow-up questions that dig deeper so the final output is sharper. Each question is one sentence. Return ONLY a JSON array of two strings — no other text, no markdown.";
  const user = `${profileStr}\n\nCore question: ${coreQ}\nTheir answer: ${answer}\n\nReturn two follow-up questions as a JSON array.`;
  const raw = await callClaude(sb, { system, user, model: AI.model_fast, max_tokens: 300 });
  let arr;
  try { arr = JSON.parse(raw); }
  catch (e) { const m = raw.match(/\[[\s\S]*\]/); arr = m ? JSON.parse(m[0]) : null; }
  if (!Array.isArray(arr) || arr.length < 2) throw new Error("Could not read the follow-up questions");
  return [String(arr[0]), String(arr[1])];
}

// Build the final master prompt from the profile + all project answers.
async function genMasterPrompt(sb, profileStr, qa) {
  const system = "You are KonText. Turn a person's identity profile plus their project answers into a single clean 'master prompt' they can paste into ChatGPT, Claude, or Gemini. Write it as direct instructions to an AI in second person (e.g. \"You are acting as...\"). Capture their voice, style, and goals, then the specific project, goal, and audience. Output ONLY the master prompt — no preamble, no explanation, no markdown headings. Keep it tight: 2 to 4 short paragraphs.";
  const body = qa.map(([q, a]) => `Q: ${q}\nA: ${a}`).join("\n\n");
  const user = `${profileStr}\n\nProject answers:\n${body}`;
  return callClaude(sb, { system, user, model: AI.model_smart, max_tokens: 700 });
}

/* ============================================================ APP */

function App() {
  const [screen, setScreen] = useState("landing");
  const [accountType, setAccountType] = useState("Personal");
  // The user's living memory: name/email from signup + onboarding answers. Empty until they sign up.
  const [profile, setProfile] = useState({ name: "", email: "", answers: {}, layer2: {}, l2q: ADAPTIVE_MOCK });

  // vault state shared between Vaults + create flow — empty until the user creates their own
  const [categories, setCategories] = useState([]);
  const [folders, setFolders] = useState({});

  // --- Cloud sync (Supabase) ---
  const [sbCfg, setSbCfg] = useState(loadCfg());
  const sbRef = useRef(makeClient(loadCfg()));
  const sb = sbRef.current;
  const [user, setUser] = useState(null);
  const [cloudMsg, setCloudMsg] = useState("");
  const hydrating = useRef(false);
  const saveTimer = useRef(null);

  const go = (s) => { setScreen(s); window.scrollTo(0, 0); };

  const configureCloud = (cfg) => { saveCfg(cfg); setSbCfg(cfg); sbRef.current = makeClient(cfg); };

  const hasProfile = (blob) => !!(blob && blob.profile && blob.profile.answers && Object.keys(blob.profile.answers).length > 0);

  const hydrate = async (u) => {
    hydrating.current = true;
    let blob = null;
    try {
      blob = await loadState(sb, u.id);
      if (blob) {
        if (blob.accountType) setAccountType(blob.accountType);
        if (blob.profile) setProfile(blob.profile);
        if (blob.categories) setCategories(blob.categories);
        if (blob.folders) setFolders(blob.folders);
      }
    } catch (e) { setCloudMsg("Couldn't load your saved data: " + e.message); }
    setTimeout(() => { hydrating.current = false; }, 0);
    return blob;
  };

  // Restore an existing session on load — finished profiles go Home, unfinished go to onboarding.
  useEffect(() => {
    if (!sb) return;
    sb.auth.getSession().then(async ({ data }) => {
      const u = data && data.session ? data.session.user : null;
      if (u) { setUser(u); const blob = await hydrate(u); go(hasProfile(blob) ? "home" : "wizard"); }
    });
  }, []);

  // Autosave to the cloud (debounced) whenever the memory changes while logged in.
  useEffect(() => {
    if (!sb || !user || hydrating.current) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      saveState(sb, user.id, { accountType, profile, categories, folders }).catch((e) => setCloudMsg("Save failed: " + e.message));
    }, 800);
  }, [accountType, profile, categories, folders, user]);

  const auth = {
    sb, user, cloudMsg, setCloudMsg, sbCfg, configureCloud,
    signUp: async (email, password, name) => {
      if (!sb) return { ok: true, local: true };
      const { data, error } = await sb.auth.signUp({ email, password, options: { data: { name } } });
      if (error) return { ok: false, error: error.message };
      if (data.session) { setUser(data.user); return { ok: true }; }
      return { ok: true, confirm: true };
    },
    signIn: async (email, password) => {
      if (!sb) return { ok: true, local: true };
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) return { ok: false, error: error.message };
      setUser(data.user); const blob = await hydrate(data.user); return { ok: true, hasProfile: hasProfile(blob) };
    },
    signOut: async () => { if (sb) { try { await sb.auth.signOut(); } catch (e) {} } setUser(null); },
  };

  const ctx = { screen, go, accountType, setAccountType, categories, setCategories, folders, setFolders, profile, setProfile, auth };

  // screens with the app chrome (sidebar)
  const appScreens = ["home", "create", "vaults", "profile", "settings"];
  const inApp = appScreens.includes(screen);

  let view;
  if (screen === "landing") view = <Landing go={go} />;
  else if (screen === "signup") view = <Signup go={go} setProfile={setProfile} auth={auth} />;
  else if (screen === "login") view = <Login go={go} auth={auth} />;
  else if (screen === "accountType") view = <AccountType {...ctx} />;
  else if (screen === "wizard") view = <Wizard {...ctx} />;
  else if (inApp) view = <Shell {...ctx} />;

  return view;
}

function AuthWrap({ children }) {
  return (
    <div className="min-h-full flex items-center justify-center px-6 py-12">

function Signup({ go, setProfile, auth }) {
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [confirm, setConfirm] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  const cloud = !!(auth && auth.sb);

  const submit = async () => {
    setErr("");
    if (cloud) {
      if (password.length < 6) { setErr("Password must be at least 6 characters."); return; }
      if (password !== confirm) { setErr("Passwords don't match."); return; }
      setBusy(true);
      const r = await auth.signUp(email.trim(), password, name.trim());
      setBusy(false);
      if (!r.ok) { setErr(r.error || "Couldn't create account."); return; }
      setProfile((p) => ({ ...p, name: name.trim(), email: email.trim() }));
      if (r.confirm) { setErr("Account created — check your email to confirm, then log in."); return; }
      go("accountType");
      return;
    }
    setProfile((p) => ({ ...p, name: name.trim(), email: email.trim() }));
    go("accountType");
  };

  return (
    <AuthWrap>
      <div className="text-center mb-6"><Logo /></div>
      <h1 className="text-xl font-medium text-center mb-6">Create your account</h1>
      <div className="space-y-4">
        <Field label="Full name" placeholder="Your name" value={name} onChange={(e) => setName(e.target.value)} />
        <Field label="Email address" placeholder="you@example.com" value={email} onChange={(e) => setEmail(e.target.value)} />
        <Field label="Password" type="password" placeholder="••••••••" value={password} onChange={(e) => setPassword(e.target.value)} />
        <Field label="Confirm password" type="password" placeholder="••••••••" value={confirm} onChange={(e) => setConfirm(e.target.value)} />
        {err && <p className="text-xs text-danger">{err}</p>}
        <Btn className="w-full" disabled={!name.trim() || busy} onClick={submit}>{busy ? "Creating…" : "Create Account"}</Btn>
      </div>
      <p className="mt-5 text-center text-sm text-muted">
        Already have an account? <button className="text-brand font-medium" onClick={() => go("login")}>Log in</button>
      </p>
    </AuthWrap>
  );
}

function Login({ go, auth }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  const cloud = !!(auth && auth.sb);

  const submit = async () => {
    setErr("");

function Wizard({ go, accountType, auth, setProfile }) {
  const sb = auth && auth.sb;
  const fixed = accountType === "Business" ? Q_BUSINESS : Q_PERSONAL;
  const [answers, setAnswers] = useState({});
  const [layer2, setLayer2] = useState(false);
  const [l2q, setL2q] = useState(ADAPTIVE_MOCK); // onboarding follow-ups (AI-generated when live)
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  const total = fixed.length + l2q.length;
  const done = Object.values(answers).filter((v) => v && String(v).trim()).length;
  const pct = Math.round((done / total) * 100);

  const set = (k, v) => setAnswers((a) => ({ ...a, [k]: v }));

  // Identity text from the fixed answers, used to generate the adaptive follow-ups.
  const layer1Text = () => {
    const lines = fixed.map((f, i) => (answers[i] && String(answers[i]).trim()) ? `- ${f.q} → ${answers[i]}` : null).filter(Boolean);
    return `Account type: ${accountType}\nFirst answers:\n${lines.join("\n")}`;
  };

  const toLayer2 = async () => {
    setErr("");
    if (sb) {
      setBusy(true);
      try { setL2q(await genOnboarding(sb, layer1Text())); }
      catch (e) { setErr("Couldn't reach the AI — showing sample questions. " + e.message); }
      setBusy(false);
    }
    setLayer2(true);
  };

  const complete = () => {
    const l1 = {}; const l2 = {};
    Object.keys(answers).forEach((k) => { if (String(k).startsWith("a")) l2[k] = answers[k]; else l1[k] = answers[k]; });
    setProfile((p) => ({ ...p, answers: l1, layer2: l2, l2q }));
    go("home");
  };

  return (
    <div className="min-h-full">
      <div className="sticky top-0 z-10 bg-tint/90 backdrop-blur border-b border-line">
        <div className="mx-auto max-w-2xl px-6 py-3">
          <div className="flex items-center justify-between mb-2">
            <Logo size="text-lg" />
            <Badge>{accountType}</Badge>
          </div>
          <div className="h-1.5 w-full rounded-full bg-line overflow-hidden">
            <div className="h-full bg-brand transition-all" style={{ width: `${pct}%` }} />
          </div>
        </div>
      </div>

      <div className="mx-auto max-w-2xl px-6 py-8">
        <h1 className="text-2xl font-medium">Let's build your KonText Profile</h1>
        <p className="text-muted mt-1.5">Answer honestly — this becomes the identity behind every prompt.</p>

        <div className="mt-8 space-y-5">
          {fixed.map((f, i) => (
            <Card key={i} className="p-5 fade">
              <div className="text-sm font-medium mb-3">{i + 1}. {f.q}</div>
              {f.type === "toggle" ? (
                <div className="flex gap-2">
                  {f.opts.map((o) => (
                    <button key={o} onClick={() => set(i, o)}
                      className={`flex-1 rounded-lg border px-4 py-2.5 text-sm ${answers[i] === o ? "border-brand bg-tint text-brand font-medium" : "border-line text-muted"}`}>
                      {o}
                    </button>
                  ))}
                </div>
              ) : f.type === "select" ? (
                <select value={answers[i] || ""} onChange={(e) => set(i, e.target.value)}
                  className="w-full rounded-lg border border-line bg-white px-3.5 py-2.5 text-sm outline-none focus:border-brand">
                  <option value="">Choose one…</option>
                  {f.opts.map((o) => <option key={o}>{o}</option>)}
                </select>
              ) : (
                <Field placeholder={f.ph} value={answers[i] || ""} onChange={(e) => set(i, e.target.value)} />
              )}
            </Card>
          ))}
        </div>

        {!layer2 ? (
          <div className="mt-6">
            {err && <p className="text-xs text-danger mb-2">{err}</p>}
            <Btn className="w-full py-3" disabled={busy} onClick={toLayer2}>{busy ? "Thinking…" : "Continue to next step"}</Btn>
          </div>
        ) : (
          <div className="mt-10 fade">
            <div className="label text-brand mb-1">Layer 2</div>
            <h2 className="text-lg font-medium mb-1">Based on what you shared, a few more questions</h2>
            <p className="text-sm text-muted mb-5">{sb ? "These were written from your answers above." : "Connect your cloud in Settings to make these adapt to your real answers. For now they're samples."}</p>
            {err && <p className="text-xs text-danger mb-3">{err}</p>}
            <div className="space-y-5">
              {l2q.map((q, i) => (
                <Card key={i} className="p-5 fade">
                  <div className="text-sm font-medium mb-3">{q}</div>
                  <Field placeholder="Type your answer…" value={answers["a" + i] || ""} onChange={(e) => set("a" + i, e.target.value)} />
                </Card>
              ))}
            </div>
            <div className="mt-6">
              <Btn className="w-full py-3" onClick={complete}>Complete my profile</Btn>
            </div>
          </div>
        )}
        <div className="h-10" />
      </div>
    </div>
  );
}

/* ----------------------------- 7. Create flow ----------------------------- */

function Create({ go, categories, setCategories, folders, setFolders, auth, profile, accountType }) {
  // step index 0..8 across 9 questions, then "output"
  const [stage, setStage] = useState(0);        // 0..8 questions, 9 = output
  const [answers, setAnswers] = useState({});
  const [followups, setFollowups] = useState({}); // { groupIndex: [q1, q2] } — AI-generated when live
  const [master, setMaster] = useState("");       // the generated master prompt
  const [busy, setBusy] = useState(false);         // calling Claude (followups or master)
  const [aiError, setAiError] = useState("");
  const [showSave, setShowSave] = useState(false);
  const [copied, setCopied] = useState(false);

  const sb = auth && auth.sb;
  const live = !!sb;
  const profileStr = profileToText(profile, accountType); // the user's memory, fed into every call

  // build linear list of 9 questions; adaptive text is AI-generated when live, sample otherwise
  const flat = [];
  CREATE_FLOW.forEach((g, gi) => {
    flat.push({ key: `c${gi}`, q: g.core, area: g.area, kind: "core", group: gi });
    flat.push({ key: `a${gi}`, q: (followups[gi] && followups[gi][0]) || g.a, area: false, kind: "adaptive", group: gi });
    flat.push({ key: `b${gi}`, q: (followups[gi] && followups[gi][1]) || g.b, area: false, kind: "adaptive", group: gi });
  });

  const isOutput = stage >= flat.length;
  const cur = flat[stage];
  const val = cur ? (answers[cur.key] || "") : "";
  const set = (v) => setAnswers((a) => ({ ...a, [cur.key]: v }));
  const allQA = () => flat.map((f) => [f.q, answers[f.key] || ""]);
  const promptText = master || MOCK_PROMPT;

  // After answering a core question, generate its two follow-ups (live only, once).
  const advance = async () => {
    setAiError("");
    if (live && cur.kind === "core" && !followups[cur.group]) {
      setBusy(true);
      try {
        const fups = await genFollowups(sb, profileStr, cur.q, val);
        setFollowups((f) => ({ ...f, [cur.group]: fups }));
      } catch (e) {
        setAiError("Couldn't reach Claude — using a sample follow-up. " + e.message);
      }
      setBusy(false);
    }
    setStage((s) => s + 1);
  };

  const generate = async () => {
    setStage(flat.length); // show output screen
    if (!live) { setMaster(MOCK_PROMPT); return; }
    setBusy(true); setAiError("");
    try {
      setMaster(await genMasterPrompt(sb, profileStr, allQA()));
    } catch (e) {
      setMaster(MOCK_PROMPT);
      setAiError("Couldn't reach Claude — showing a sample prompt. " + e.message);
    }
    setBusy(false);
  };

  if (isOutput) {
    return (
      <div className="mx-auto max-w-2xl px-6 py-8">
        <button className="flex items-center gap-1 text-sm text-muted hover:text-ink mb-4" onClick={() => setStage(flat.length - 1)}>
          <Icon d={icons.back} className="h-4 w-4" /> Back to questions
        </button>
        <h1 className="text-2xl font-medium mb-1">Your Master Prompt</h1>
        <p className="text-muted mb-5">Built from your profile and your answers. Ready to paste anywhere.</p>

        {busy ? (
          <Card className="p-10 text-center text-muted fade">Writing your master prompt…</Card>
        ) : (
          <Card className="p-6 whitespace-pre-wrap text-sm leading-relaxed text-ink">{promptText}</Card>
        )}
        {aiError && <p className="mt-3 text-xs text-danger">{aiError}</p>}

        {!busy && (
          <div className="mt-5 flex gap-3">
            <Btn onClick={() => { try { navigator.clipboard && navigator.clipboard.writeText(promptText); } catch (e) {} setCopied(true); setTimeout(() => setCopied(false), 1500); }}>
              <Icon d={copied ? icons.check : icons.copy} className="h-4 w-4" /> {copied ? "Copied" : "Copy to clipboard"}
            </Btn>
            <Btn variant="secondary" onClick={() => setShowSave(true)}>Save to Vault</Btn>
          </div>
        )}

        {showSave && (
          <SaveModal
            categories={categories} setCategories={setCategories}
            onClose={() => setShowSave(false)}
            onSave={(name, cat) => {
              setFolders((f) => ({ ...f, [cat]: [{ name, date: "just now", ts: Date.now(), text: promptText }, ...(f[cat] || [])] }));
              setShowSave(false);
              go("vaults");
            }}
          />
        )}
      </div>
    );
  }

  return (
    <div className="mx-auto max-w-2xl px-6 py-8">
      <PageHead title="Tell us about your project" sub="We'll use your KonText profile + your answers to build your master prompt." />

      <div className="mb-5">
        {live ? (
          <span className="inline-flex items-center gap-1.5 rounded-full bg-tint px-3 py-1 text-xs font-medium text-brand">
            <span className="h-1.5 w-1.5 rounded-full bg-ok" /> Live AI — follow-ups adapt to your answers
          </span>
        ) : (
          <span className="inline-flex items-center gap-2 text-xs text-muted">
            Sample mode — follow-ups are examples.
            <button className="text-brand font-medium" onClick={() => go("settings")}>Connect cloud</button>
          </span>
        )}
      </div>

      <div className="mb-6">
        <div className="flex justify-between text-xs text-muted mb-2">
          <span>Question {stage + 1} of {flat.length}</span>
          <span className="capitalize">{cur.kind === "core" ? "Core question" : "Follow-up"}</span>
        </div>
        <div className="h-1.5 w-full rounded-full bg-line overflow-hidden">
          <div className="h-full bg-brand transition-all" style={{ width: `${((stage) / flat.length) * 100}%` }} />
        </div>
      </div>

      <Card className="p-6 fade" key={cur.key}>
        <div className="text-base font-medium mb-4">{cur.q}</div>
        {cur.area ? (
          <TextArea rows={4} placeholder="Type your answer…" value={val} onChange={(e) => set(e.target.value)} />
        ) : (
          <Field placeholder="Type your answer…" value={val} onChange={(e) => set(e.target.value)} />
        )}
      </Card>
      {aiError && <p className="mt-3 text-xs text-danger">{aiError}</p>}

      <div className="mt-6 flex justify-between">
        <Btn variant="ghost" disabled={stage === 0 || busy} onClick={() => setStage((s) => s - 1)}>Back</Btn>
        {stage < flat.length - 1 ? (
          <Btn disabled={!val.trim() || busy} onClick={advance}>{busy ? "Thinking…" : "Next"}</Btn>
        ) : (
          <Btn disabled={!val.trim() || busy} onClick={generate}>{busy ? "Thinking…" : "Generate my master prompt"}</Btn>
        )}
      </div>
    </div>
  );
}

function SaveModal({ categories, setCategories, onClose, onSave }) {
  const [name, setName] = useState("");
  const [cat, setCat] = useState("");
  const [creating, setCreating] = useState(false);
  const [newCat, setNewCat] = useState("");

  const finalCat = creating ? newCat.trim() : cat;
  const canSave = name.trim() && finalCat;

  return (
    <div className="fixed inset-0 z-30 flex items-center justify-center bg-ink/30 px-6" onClick={onClose}>
      <Card className="w-full max-w-sm p-6 fade" onClick={(e) => e.stopPropagation()}>
        <h2 className="text-lg font-medium mb-4">Save your prompt</h2>
        <div className="space-y-4">
          <Field label="Prompt name" placeholder="e.g. Q2 launch email" value={name} onChange={(e) => setName(e.target.value)} />
          {!creating ? (
            <label className="block">
              <span className="label text-muted block mb-1.5">Category</span>
              <select value={cat} onChange={(e) => { if (e.target.value === "__new") { setCreating(true); } else setCat(e.target.value); }}
                className="w-full rounded-lg border border-line bg-white px-3.5 py-2.5 text-sm outline-none focus:border-brand">
                <option value="">Choose a category…</option>
                {categories.map((c) => <option key={c}>{c}</option>)}
                <option value="__new">+ Create new category</option>
              </select>
            </label>
          ) : (
            <Field label="New category" placeholder="Category name" value={newCat} onChange={(e) => setNewCat(e.target.value)} />
          )}
        </div>
        <div className="mt-6 flex items-center justify-end gap-3">
          <button className="text-sm text-muted hover:text-ink" onClick={onClose}>Cancel</button>
          <Btn disabled={!canSave} onClick={() => {
            if (creating && !categories.some((c) => c.toLowerCase() === finalCat.toLowerCase())) setCategories((cs) => [...cs, finalCat]);
            onSave(name.trim(), finalCat);
          }}>Save</Btn>
        </div>
      </Card>
    </div>
  );
}

/* ----------------------------- 8. Vaults ----------------------------- */

function Vaults({ go, categories, setCategories, folders, setFolders }) {
  const [open, setOpen] = useState(null); // folder name
  const [query, setQuery] = useState("");
  const [newTag, setNewTag] = useState("");
  const [dupe, setDupe] = useState(false);
  const tagInputRef = useRef(null);

  const addTag = () => {
    const v = newTag.trim();
    if (!v) return;
    if (v.length > 32) return;
    if (categories.some((c) => c.toLowerCase() === v.toLowerCase())) { setDupe(true); return; }
    setCategories((c) => [...c, v]);
    setFolders((f) => ({ ...f, [v]: f[v] || [] }));
    setNewTag(""); setDupe(false);
  };
  const delTag = (t) => {
    setCategories((c) => c.filter((x) => x !== t));
    setFolders((f) => { const n = { ...f }; delete n[t]; return n; });
    if (open === t) setOpen(null);
  };

  if (open) return <FolderView name={open} go={go} folders={folders} setFolders={setFolders} onBack={() => setOpen(null)} />;

  const folderNames = categories.filter((c) => !query || c.toLowerCase().includes(query.toLowerCase()));

  return (
    <div className="mx-auto max-w-3xl px-6 py-8">
      <PageHead title="My Vaults" right={<Btn onClick={() => tagInputRef.current && tagInputRef.current.focus()}><Icon d={icons.plus} className="h-4 w-4" /> New Folder</Btn>} />

      <div className="relative mb-6">
        <Icon d={icons.search} className="h-4 w-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-muted" />
        <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search your vaults..."
          className="w-full rounded-lg border border-line bg-white pl-10 pr-3.5 py-2.5 text-sm outline-none focus:border-brand" />
      </div>

      {/* category manager */}
      <Card className="p-5 mb-6">
        <div className="label text-muted mb-3">My categories</div>
        {categories.length === 0 ? (
          <p className="text-sm text-muted mb-3">No categories yet — add one below</p>
        ) : (
          <div className="flex flex-wrap gap-2 mb-3">
            {categories.map((t) => (
              <span key={t} className="inline-flex items-center gap-1.5 rounded-full bg-tagbg px-3 py-1 text-xs font-medium text-tagink">
                {t}
                <button onClick={() => delTag(t)} className="hover:text-danger"><Icon d={icons.x} className="h-3 w-3" /></button>
              </span>
            ))}
          </div>
        )}
        <div className="flex gap-2">
          <input
            ref={tagInputRef}
            value={newTag}
            maxLength={32}
            onChange={(e) => { setNewTag(e.target.value); setDupe(false); }}
            onKeyDown={(e) => { if (e.key === "Enter") addTag(); }}
            placeholder="New category name..."
            className={`flex-1 rounded-lg border bg-white px-3.5 py-2 text-sm outline-none ${dupe ? "border-danger ring-2 ring-danger/30" : "border-line focus:border-brand"}`}
          />
          <Btn onClick={addTag}>Add category</Btn>
        </div>
      </Card>

      {/* folder grid */}
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
        {folderNames.map((name) => (
          <button key={name} onClick={() => setOpen(name)}
            className="rounded-xl border border-line bg-white p-5 text-left hover:border-brand/50 transition-colors">
            <div className="flex items-center justify-between">
              <Icon d={icons.folder} className="h-7 w-7 text-brand" />
              <Icon d={icons.chevron} className="h-4 w-4 text-muted" />
            </div>
            <div className="mt-3 text-sm font-medium">{name}</div>
            <div className="text-xs text-muted mt-0.5">{(folders[name] || []).length} prompts</div>
          </button>
        ))}
      </div>
    </div>
  );
}

function FolderView({ name, go, folders, setFolders, onBack }) {
  const items = folders[name] || [];
  const [editIdx, setEditIdx] = useState(null);
  const [draft, setDraft] = useState("");
  const [confirmIdx, setConfirmIdx] = useState(null);
  const [copiedIdx, setCopiedIdx] = useState(null);
  const [note, setNote] = useState("");

  const update = (idx, text) => setFolders((f) => ({ ...f, [name]: f[name].map((p, i) => i === idx ? { ...p, text } : p) }));
  const remove = (idx) => setFolders((f) => ({ ...f, [name]: f[name].filter((_, i) => i !== idx) }));
  const copyText = (t) => { try { navigator.clipboard && navigator.clipboard.writeText(t); } catch (e) {} };
  const flash = (msg) => { setNote(msg); setTimeout(() => setNote(""), 1500); };
  const exportTxt = (p) => {
    try {
      const blob = new Blob([p.text], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = (p.name || "prompt").replace(/[^a-z0-9]+/gi, "-").toLowerCase() + ".txt";
      document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    } catch (e) { flash("Couldn't export"); }
  };

  return (
    <div className="mx-auto max-w-3xl px-6 py-8">
      <button className="flex items-center gap-1 text-sm text-muted hover:text-ink mb-4" onClick={onBack}>
        <Icon d={icons.back} className="h-4 w-4" /> My Vaults
      </button>
      <PageHead title={name} right={<Btn onClick={() => go("create")}><Icon d={icons.plus} className="h-4 w-4" /> New Prompt</Btn>} />
      {note && <p className="mb-3 text-xs text-ok">{note}</p>}

      {items.length === 0 ? (
        <Card className="p-10 text-center text-muted">No prompts in this folder yet.</Card>
      ) : (
        <div className="space-y-3">
          {items.map((p, idx) => (
            <Card key={idx} className="p-5">
              <div className="flex items-start justify-between gap-3">
                <div className="min-w-0">
                  <div className="text-sm font-medium">{p.name}</div>
                  <div className="text-xs text-muted mt-0.5">{p.date}</div>
                  {editIdx !== idx && <div className="text-sm text-muted mt-2 truncate">{p.text.split("\n")[0]}</div>}
                </div>
                <div className="flex items-center gap-1 shrink-0 text-muted">
                  <button title="Edit" className="p-1.5 hover:text-brand" onClick={() => { setEditIdx(idx); setDraft(p.text); }}><Icon d={icons.edit} className="h-4 w-4" /></button>
                  <button title="Copy" className="p-1.5 hover:text-brand" onClick={() => { copyText(p.text); setCopiedIdx(idx); setTimeout(() => setCopiedIdx(null), 1200); }}><Icon d={copiedIdx === idx ? icons.check : icons.copy} className="h-4 w-4" /></button>
                  <button title="Copy to share" className="p-1.5 hover:text-brand" onClick={() => { copyText(p.text); flash("Copied — paste anywhere to share"); }}><Icon d={icons.share} className="h-4 w-4" /></button>
                  <button title="Export as .txt" className="p-1.5 hover:text-brand" onClick={() => exportTxt(p)}><Icon d={icons.download} className="h-4 w-4" /></button>
                  <button title="Delete" className="p-1.5 hover:text-danger" onClick={() => setConfirmIdx(idx)}><Icon d={icons.trash} className="h-4 w-4" /></button>
                </div>
              </div>

              {editIdx === idx && (
                <div className="mt-3 fade">
                  <TextArea rows={6} value={draft} onChange={(e) => setDraft(e.target.value)} />
                  <div className="mt-3 flex gap-2">
                    <Btn onClick={() => { update(idx, draft); setEditIdx(null); }}>Save changes</Btn>
                    <Btn variant="ghost" onClick={() => setEditIdx(null)}>Cancel</Btn>
                  </div>
                </div>
              )}

              {confirmIdx === idx && (
                <div className="mt-3 rounded-lg bg-red-50 border border-danger/30 p-3 fade">
                  <div className="text-sm text-ink">Are you sure? This cannot be undone.</div>
                  <div className="mt-2 flex gap-2">
                    <Btn variant="danger" onClick={() => { remove(idx); setConfirmIdx(null); }}>Confirm delete</Btn>
                    <Btn variant="ghost" onClick={() => setConfirmIdx(null)}>Cancel</Btn>
                  </div>
                </div>
              )}
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}

/* ----------------------------- 9. Profile ----------------------------- */

function Profile({ accountType, profile, setProfile }) {
  const fixed = accountType === "Business" ? Q_BUSINESS : Q_PERSONAL;
  const ans = profile.answers || {};
  const fields = fixed.map((f, i) => ({
    key: i,
    label: f.q,
    value: (ans[i] != null && String(ans[i]).trim()) ? String(ans[i]) : "—",
  }));
  const filled = fields.filter((f) => f.value !== "—");
  const traits = filled.slice(0, 3);

  // edit the name + email on the identity card
  const [editId, setEditId] = useState(false);
  const [nameDraft, setNameDraft] = useState(profile.name || "");
  const [emailDraft, setEmailDraft] = useState(profile.email || "");
  const openId = () => { setNameDraft(profile.name || ""); setEmailDraft(profile.email || ""); setEditId(true); };
  const saveId = () => { setProfile((p) => ({ ...p, name: nameDraft.trim(), email: emailDraft.trim() })); setEditId(false); };

  // edit each onboarding answer
  const [editIdx, setEditIdx] = useState(null);
  const [draft, setDraft] = useState("");
  const saveField = (i) => {
    setProfile((p) => ({ ...p, answers: { ...(p.answers || {}), [i]: draft } }));
    setEditIdx(null);
  };

  return (
    <div className="mx-auto max-w-3xl px-6 py-8">
      <Card className="p-7 mb-8">
        <div className="flex items-start justify-between gap-4">
          <div className="flex items-center gap-4 min-w-0">
            <div className="flex h-16 w-16 items-center justify-center rounded-full bg-tint text-lg font-medium text-brand shrink-0">{initials(profile.name)}</div>
            {editId ? (
              <div className="fade w-full">
                <Field label="Name" value={nameDraft} onChange={(e) => setNameDraft(e.target.value)} />
                <div className="mt-2"><Field label="Email" value={emailDraft} onChange={(e) => setEmailDraft(e.target.value)} /></div>
              </div>
            ) : (
              <div className="min-w-0">
                <div className="text-lg font-medium truncate">{profile.name || "—"}</div>
                <div className="text-sm text-muted truncate">{profile.email || "—"}</div>
                <div className="mt-2"><Badge>{accountType}</Badge></div>
              </div>
            )}
          </div>
          {editId ? (
            <div className="flex gap-2 shrink-0">
              <Btn onClick={saveId}>Save</Btn>
              <Btn variant="ghost" onClick={() => setEditId(false)}>Cancel</Btn>
            </div>
          ) : (
            <Btn variant="secondary" className="shrink-0" onClick={openId}>
              <Icon d={icons.edit} className="h-4 w-4" /> Edit
            </Btn>
          )}
        </div>
        {traits.length > 0 && !editId && (
          <div className="mt-6 grid grid-cols-1 sm:grid-cols-3 gap-4 border-t border-line pt-5">
            {traits.map((t) => (
              <div key={t.key}>
                <div className="label text-muted mb-1">{t.label}</div>
                <div className="text-sm">{t.value}</div>
              </div>
            ))}
          </div>
        )}
      </Card>

      <h2 className="text-lg font-medium">Your KonText Profile</h2>
      <p className="text-sm text-muted mt-1 mb-5">These answers shape every master prompt KonText builds for you. Edit any of them and it updates your memory.</p>
      {filled.length === 0 ? (
        <Card className="p-6 text-sm text-muted">No profile answers yet. Complete onboarding to build your identity.</Card>
      ) : (
        <div className="space-y-3">
          {fields.map((f, i) => (
            <Card key={i} className="p-4">
              <div className="flex items-start justify-between gap-3">
                <div className="label text-muted">{f.label}</div>
                {editIdx !== i && (
                  <button className="text-muted hover:text-brand p-1 shrink-0" title="Edit" onClick={() => { setEditIdx(i); setDraft(f.value === "—" ? "" : f.value); }}>
                    <Icon d={icons.edit} className="h-4 w-4" />
                  </button>
                )}
              </div>
              {editIdx === i ? (
                <div className="fade mt-1.5">
                  <Field value={draft} onChange={(e) => setDraft(e.target.value)} />
                  <div className="mt-2 flex gap-2">
                    <Btn onClick={() => saveField(i)}>Save</Btn>
                    <Btn variant="ghost" onClick={() => setEditIdx(null)}>Cancel</Btn>
                  </div>
                </div>
              ) : (
                <div className="text-sm mt-1.5">{f.value}</div>
              )}
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}

/* ----------------------------- 10. Settings ----------------------------- */

function Settings({ go, profile, auth }) {
  const [emailNotif, setEmailNotif] = useState(true);
  const [weekly, setWeekly] = useState(false);
  const [confirmDel, setConfirmDel] = useState(false);

  const cloud = !!(auth && auth.sb && auth.user);
  const [email, setEmail] = useState(profile.email || "");
  const [pw, setPw] = useState("");
  const [acctMsg, setAcctMsg] = useState("");
  const [acctBad, setAcctBad] = useState(false);
  const say = (msg, bad) => { setAcctMsg(msg); setAcctBad(!!bad); };

  const saveEmail = async () => {
    if (!cloud) { say("Connect an account first.", true); return; }
    const { error } = await auth.sb.auth.updateUser({ email: email.trim() });
    error ? say(error.message, true) : say("Check your new email to confirm the change.");
  };
  const savePassword = async () => {
    if (!cloud) { say("Connect an account first.", true); return; }
    if (pw.length < 6) { say("Password must be at least 6 characters.", true); return; }
    const { error } = await auth.sb.auth.updateUser({ password: pw });
    if (error) { say(error.message, true); } else { setPw(""); say("Password updated."); }
  };
  const deleteAccount = async () => {
    // Clears your saved profile + vault from the cloud and signs you out.
    if (cloud) { try { await saveState(auth.sb, auth.user.id, {}); } catch (e) {} }
    await auth.signOut();
    go("landing");
  };

  const Toggle = ({ on, onClick, label }) => (
    <div className="flex items-center justify-between py-2">
      <span className="text-sm">{label}</span>
      <button onClick={onClick} className={`h-6 w-11 rounded-full transition-colors ${on ? "bg-brand" : "bg-line"}`}>
        <span className={`block h-5 w-5 rounded-full bg-white transition-transform ${on ? "translate-x-5" : "translate-x-0.5"}`} />
      </button>
    </div>
  );

  return (
    <div className="mx-auto max-w-2xl px-6 py-8">
      <PageHead title="Settings" />

      {auth.cloudMsg && <p className="mb-4 text-xs text-danger">{auth.cloudMsg}</p>}

      <Card className="p-6 mb-5">
        <div className="label text-muted mb-4">Account</div>
        <div className="space-y-4">
          <div className="flex gap-2 items-end">
            <div className="flex-1"><Field label="Change email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@example.com" /></div>
            <Btn variant="secondary" onClick={saveEmail}>Save</Btn>
          </div>
          <div className="flex gap-2 items-end">
            <div className="flex-1"><Field label="Change password" type="password" value={pw} onChange={(e) => setPw(e.target.value)} placeholder="New password" /></div>
            <Btn variant="secondary" onClick={savePassword}>Save</Btn>
          </div>
          {acctMsg && <p className={`text-xs ${acctBad ? "text-danger" : "text-ok"}`}>{acctMsg}</p>}
        </div>
      </Card>

      <Card className="p-6 mb-5">
        <div className="label text-muted mb-3">Subscription</div>
        <div className="flex items-center justify-between">
          <div>
            <div className="text-sm font-medium">Plan: Pro</div>
            <div className="text-xs text-muted">Placeholder for V1</div>
          </div>
          <Btn variant="secondary" disabled>Manage billing</Btn>
        </div>
      </Card>

      <Card className="p-6 mb-5">
        <div className="label text-muted mb-2">Notifications</div>
        <Toggle on={emailNotif} onClick={() => setEmailNotif((v) => !v)} label="Email notifications" />
        <Toggle on={weekly} onClick={() => setWeekly((v) => !v)} label="Weekly prompt summaries" />
      </Card>

      <Card className="p-6 mb-5 border-danger/40">
        <div className="label text-danger mb-3">Danger zone</div>
        {!confirmDel ? (
          <Btn variant="danger" onClick={() => setConfirmDel(true)}>Delete my data</Btn>
        ) : (
          <div className="fade">
            <div className="text-sm mb-3">This erases your saved profile and vaults and signs you out. This cannot be undone.</div>
            <div className="flex gap-2">
              <Btn variant="danger" onClick={deleteAccount}>Yes, delete</Btn>
              <Btn variant="ghost" onClick={() => setConfirmDel(false)}>Cancel</Btn>
            </div>
          </div>
        )}
      </Card>

      <Btn variant="secondary" className="w-full" onClick={async () => { await auth.signOut(); go("landing"); }}>Log out</Btn>
    </div>
  );
}

/* ----------------------------- mount ----------------------------- */
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
